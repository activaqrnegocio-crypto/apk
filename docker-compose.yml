version: '3.8'

services:
  app:
    # v267: Build in GitHub Actions (fast/free) -> VPS only pulls (Zero Downtime)
    image: ghcr.io/activaqrnegocio-crypto/aquatech-render:latest
    container_name: aquatech-crm-v2
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    # Zero Downtime: Docker waits for the app to be ready before swapping
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/auth/session"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
